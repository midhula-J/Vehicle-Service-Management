<!DOCTYPE html>
<html>
<head>

    <title>Vehicle Service Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body onload="loadServices()">

<div class="container mt-5">

    <h2 class="text-center mb-4">Vehicle Service Management</h2>

    <div class="card p-4 shadow">

        <h4>Add Service Record</h4>

        <div class="row">

            <div class="col-md-6 mb-3">
                <input id="vehicleNumber" placeholder="Vehicle Number" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <input id="ownerName" placeholder="Owner Name" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <input id="contactNumber" placeholder="Contact Number" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <select id="serviceType" class="form-control">
                    <option value="">Select Service Type</option>
                    <option>General</option>
                    <option>Repair</option>
                    <option>Maintenance</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <input id="serviceCost" placeholder="Service Cost" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <input id="serviceDate" type="date" class="form-control">
            </div>

        </div>

        <button onclick="addService()" class="btn btn-success">Add Service</button>

    </div>

    <hr>

    <div class="card p-4 shadow">

        <h4>Service Records</h4>

        <table class="table table-striped table-hover">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Vehicle</th>
                <th>Owner</th>
                <th>Type</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
