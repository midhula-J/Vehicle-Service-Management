<!DOCTYPE html>
<html>
<head>

    <title>Vehicle Service Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body onload="loadServices()">

<div class="container mt-5">

    <h2 class="text-center mb-4">Vehicle Service Management</h2>

    <div class="card p-4 shadow">

        <h4>Add Service Record</h4>

        <div class="row">

            <div class="col-md-6 mb-3">
                <input id="vehicleNumber" placeholder="Vehicle Number" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <input id="ownerName" placeholder="Owner Name" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <input id="contactNumber" placeholder="Contact Number" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <select id="serviceType" class="form-control">
                    <option value="">Select Service Type</option>
                    <option>General</option>
                    <option>Repair</option>
                    <option>Maintenance</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <input id="serviceCost" placeholder="Service Cost" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <input id="serviceDate" type="date" class="form-control">
            </div>

        </div>

        <button onclick="addService()" class="btn btn-success">Add Service</button>

    </div>

    <hr>

    <div class="card p-4 shadow">

        <h4>Search Service</h4>

        <div class="row">

            <div class="col-md-8">
                <input id="searchVehicle" placeholder="Search by Vehicle Number" class="form-control">
            </div>

            <div class="col-md-4">
                <button onclick="searchVehicle()" class="btn btn-primary w-100">Search</button>
            </div>

        </div>

    </div>

    <hr>

    <div class="card p-4 shadow">

        <h4>Service Records</h4>

        <table class="table table-striped table-hover">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Vehicle</th>
                <th>Owner</th>
                <th>Type</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>

<script>

    const API = "http://localhost:8081/services";

    function addService(){

        let service = {
            vehicleNumber: document.getElementById("vehicleNumber").value,
            ownerName: document.getElementById("ownerName").value,
            contactNumber: document.getElementById("contactNumber").value,
            serviceType: document.getElementById("serviceType").value,
            serviceCost: document.getElementById("serviceCost").value,
            serviceDate: document.getElementById("serviceDate").value,
            serviceStatus: "Pending"
        };

        fetch(API + "/add",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(service)
        })
            .then(res=>res.json())
            .then(data=>{
                alert("Service Added Successfully");
                loadServices();
            });
    }

    function loadServices(){

        fetch(API + "/all")
            .then(res=>res.json())
            .then(data=>{

                let table = document.getElementById("tableBody");
                table.innerHTML="";

                data.forEach(s=>{

                    table.innerHTML += `
<tr>
<td>${s.id}</td>
<td>${s.vehicleNumber}</td>
<td>${s.ownerName}</td>
<td>${s.serviceType}</td>
<td>${s.serviceStatus}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="deleteService(${s.id})">Delete</button>
</td>
</tr>
`;

                });

            });

    }

    function deleteService(id){

        fetch(API + "/delete/"+id,{
            method:"DELETE"
        })
            .then(()=>loadServices());

    }

    function searchVehicle(){

        let vehicle = document.getElementById("searchVehicle").value;

        fetch(API + "/vehicle/"+vehicle)
            .then(res=>res.json())
            .then(data=>{

                let table = document.getElementById("tableBody");
                table.innerHTML="";

                data.forEach(s=>{

                    table.innerHTML += `
<tr>
<td>${s.id}</td>
<td>${s.vehicleNumber}</td>
<td>${s.ownerName}</td>
<td>${s.serviceType}</td>
<td>${s.serviceStatus}</td>
<td>-</td>
</tr>
`;

                });

            });

    }

</script>

</body>
</html>
